name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect to happen?
      placeholder: "I ran `python demo.py` and got an error..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Clone the repo
        2. Run `python demo.py`
        3. See error
    validations:
      required: true
  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste the full error traceback if applicable.
      render: shell
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.3"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux / WSL
        - Other
  - type: input
    id: agent
    attributes:
      label: AI agent used (if applicable)
      placeholder: "Claude Code, Codex CLI, Cursor, etc."
